    <!-- GitHub Pages SPA router support -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License from https://github.com/rafgraph/spa-github-pages
      (function() {
        // Handle redirects from 404.html page
        var redirectPath = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirectPath && redirectPath !== window.location.href) {
          history.replaceState(null, null, redirectPath);
        }

        // Handle direct navigation with query parameters
        if (window.location.search[1] === '/' ) {
          var decoded = window.location.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            window.location.pathname.slice(0, -1) + decoded + window.location.hash
          );
        }
      })();
    </script>
